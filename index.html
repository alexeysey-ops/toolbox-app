<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Bill of Quantities</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --ink:#111827; --muted:#6b7280; --faint:#9ca3af; --hair:#e5e7eb; --hair2:#eef1f4;
    --navy:#16314f; --navy2:#2c5378; --flag:#9a3412; --paper:#ffffff;
    --serif:Georgia,'Times New Roman',serif; --sans:Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper)}
  body{font-family:var(--sans);color:var(--ink);padding:0 16px calc(96px + env(safe-area-inset-bottom,0px));max-width:560px;margin:0 auto}
  .topbar{border-top:4px solid var(--navy);margin:0 -16px;padding:14px 16px 0}
  .topbar.flag{border-top-color:var(--flag)}
  .brand{font-size:9.5px;letter-spacing:.2em;color:var(--muted)}
  .brandfoot{text-align:center;font-size:8.5px;letter-spacing:.22em;color:var(--faint);padding:22px 0 6px}
  .chip{border:1px solid var(--hair);color:var(--muted);font-size:11px;padding:4px 10px;border-radius:11px;cursor:pointer;white-space:nowrap}
  .chip.on{background:var(--navy);border-color:var(--navy);color:#fff}
  h1{font-family:var(--serif);font-size:21px;margin:8px 0 2px;font-weight:700}
  .sub{font-size:12px;color:var(--muted);margin-bottom:14px}
  .sub .demo{color:var(--flag);font-weight:bold}
  .kpi{display:flex;border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);margin-bottom:16px}
  .kpi>div{flex:1;padding:10px 4px;text-align:center}
  .kpi>div+div{border-left:1px solid var(--hair)}
  .kpi .k{font-size:9px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
  .kpi .v{font-family:var(--serif);font-size:15px;color:var(--navy)}
  .kpi .v.warn{color:var(--flag)}
  .btn{display:block;width:100%;padding:13px 14px;margin-bottom:10px;font-family:var(--sans);font-size:14px;
       border:1px solid var(--navy);background:#fff;color:var(--navy);text-align:left;border-radius:2px;cursor:pointer}
  .btn.primary{background:var(--navy);color:#fff}
  .btn.flag{border-color:var(--flag);color:var(--flag)}
  .btn.flag.filled{background:var(--flag);color:#fff}
  .btn:active{opacity:.85}
  .sep{border:0;border-top:1px solid var(--hair);margin:16px 0}
  .caps{font-size:9px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase}
  table{width:100%;border-collapse:collapse}
  th{font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;font-weight:normal;
     text-align:left;padding:6px 4px;border-bottom:1px solid var(--ink)}
  th.num,td.num{text-align:right}
  td{padding:9px 4px;border-bottom:1px solid var(--hair2);font-size:13px;vertical-align:top}
  td .code{font-size:10px;color:var(--faint)}
  td .meta{font-size:10.5px;color:var(--muted);margin-top:2px}
  .money{font-family:var(--serif);color:var(--navy);white-space:nowrap}
  .rowlink{cursor:pointer}
  .rowlink:active{background:var(--hair2)}
  .bar{height:3px;background:var(--hair);margin-top:6px;border-radius:1px;overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--navy)}
  .totalrow td{border-top:1.5px solid var(--ink);border-bottom:none;font-family:var(--serif);color:var(--navy);font-size:14px;padding-top:10px}
  .back{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:8px 0;letter-spacing:.06em}
  input.pct,input.qty,input.price{width:64px;padding:6px 6px;font-size:13px;border:1px solid var(--hair);border-radius:2px;
       text-align:right;font-family:var(--serif);color:var(--ink);background:#fff}
  input.price{width:92px}
  input.changed{border-color:var(--flag);color:var(--flag)}
  .foot{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--hair);
        padding:10px 16px;padding-bottom:calc(16px + env(safe-area-inset-bottom,0px));
        display:flex;justify-content:space-between;align-items:center;gap:10px;max-width:560px;margin:0 auto}
  .screen-pad{height:calc(78px + env(safe-area-inset-bottom,0px))}
  .pdfbtn{border:1px solid var(--navy);color:var(--navy);background:#fff;padding:9px 14px;font-size:12px;border-radius:2px;cursor:pointer;letter-spacing:.08em}
  .actbtn{flex:1;max-width:300px;background:var(--navy);color:#fff;border:1px solid var(--navy);padding:10px 12px;font-size:13px;border-radius:2px;cursor:pointer}
  .actbtn.flag{background:var(--flag);border-color:var(--flag)}
  .actbtn:disabled{opacity:.4}
  .pending{font-size:11px;color:var(--flag)}
  .card{border:1px solid var(--hair);border-radius:2px;padding:12px;margin-bottom:10px;cursor:pointer}
  .card.sel{border-color:var(--flag)}
  .card .t{font-family:var(--serif);font-size:14px;color:var(--ink)}
  .card .m{font-size:11px;color:var(--muted);margin-top:3px}
  .note{font-size:11px;color:var(--faint);margin-top:14px;line-height:1.5}
  .bigok{font-family:var(--serif);font-size:18px;color:var(--navy);margin:18px 0 6px}
  #screen{min-height:60vh}
</style>
</head>
<body>
  <div id="screen"></div>
  <div class="brandfoot">ENKI &amp; GEDE BAGUS &middot; BALI</div>
<script>
'use strict';
/* ============ context ============ */
var Q = new URLSearchParams(location.search);
var ROUTE = Q.get('route') || '';
var WA = window.Telegram && window.Telegram.WebApp;
if (WA) { WA.ready(); WA.expand(); }

/* ============ data layer ============ */
/* DEMO provider: fake numbers only. Real provider (webhook + initData) arrives next step. */
var DEMO = {
  name: 'Demo Villa', route: ROUTE || 'demo', demo: true,
  budget: 1234000000, paid: 640000000,
  payments: [
    { date: '02.04.2026', note: 'Payment to contractor 1', amount: 200000000 },
    { date: '05.05.2026', note: 'Payment to contractor 2', amount: 240000000 },
    { date: '01.06.2026', note: 'Payment to contractor 3', amount: 200000000 }
  ],
  snapshots: [
    { id: 'snap3', date: '03.07.2026 14:05', label: 'before Site check save', cells: 97 },
    { id: 'snap2', date: '01.07.2026 20:48', label: 'before qty edit WAL-005', cells: 97 },
    { id: 'snap1', date: '29.06.2026 15:07', label: 'before name edit', cells: 97 }
  ],
  tasks: [
    { name: 'Pool plumbing pressure test', status: 'In progress', assignee: 'Ketut', start: '2026-06-25', due: '2026-07-01', overdue: true },
    { name: 'Waterproofing rooftop, 2nd layer', status: 'In progress', assignee: 'Wayan', start: '2026-06-28', due: '2026-07-05', overdue: false },
    { name: 'Order bathroom natural stone', status: 'New', assignee: '', start: null, due: null, overdue: false },
    { name: 'Gypsum ceiling, communal area', status: 'Review', assignee: 'Made', start: '2026-06-20', due: '2026-06-30', overdue: false },
    { name: 'Fence painting, exterior side', status: 'On hold', assignee: 'Wayan', start: '2026-06-15', due: null, overdue: false },
    { name: 'Site meeting #12', status: 'Approved', assignee: 'Aleksei', start: null, due: null, overdue: false }
  ],
  sections: [
    { id: 's1', name: 'Preliminaries', positions: [
      { code: 'PRE-001', desc: 'Site clearing and disposal', qty: 615, unit: 'm2', price: 25000, done: 100 },
      { code: 'PRE-002', desc: 'Temporary work house', qty: 25, unit: 'm2', price: 1000000, done: 100 },
      { code: 'PRE-003', desc: 'Labour safety equipment', qty: 1, unit: 'ls', price: 10000000, done: 60 } ] },
    { id: 's2', name: 'Wall works', positions: [
      { code: 'WAL-001', desc: 'Brick wall 100mm', qty: 780, unit: 'm2', price: 210000, done: 90 },
      { code: 'WAL-002', desc: 'Brick wall 75mm', qty: 12, unit: 'm2', price: 190000, done: 100 },
      { code: 'WAL-003', desc: 'Practical columns', qty: 148, unit: 'ml', price: 155000, done: 85 },
      { code: 'WAL-004', desc: 'Plaster works', qty: 1700, unit: 'm2', price: 95000, done: 55 } ] },
    { id: 's3', name: 'Ceiling works', positions: [
      { code: 'CEI-001', desc: 'Gypsum ceiling', qty: 200, unit: 'm2', price: 237000, done: 30 },
      { code: 'CEI-002', desc: 'Wood ceiling incl. coating', qty: 90, unit: 'm2', price: 1150000, done: 0 } ] },
    { id: 's4', name: 'Painting works', positions: [
      { code: 'PNT-001', desc: 'Exterior paint two coats', qty: 850, unit: 'm2', price: 95000, done: 10 },
      { code: 'PNT-002', desc: 'Interior paint two coats', qty: 680, unit: 'm2', price: 85000, done: 0 } ] }
  ]
};
DEMO.sections.forEach(function (s) {
  s.total = 0; s.doneRp = 0;
  s.positions.forEach(function (p) { p.total = p.qty * p.price; s.total += p.total; s.doneRp += p.total * p.done / 100; });
  s.done = s.total ? Math.round(100 * s.doneRp / s.total) : 0;
});
var P = DEMO;

/* ============ helpers ============ */
function rp(n){ if (n === null || n === undefined || isNaN(n)) return '—'; return 'Rp ' + Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' '); }
function pct(v){ return (v === null || v === undefined) ? '—' : v + '%'; }
function el(html){ var d = document.createElement('div'); d.innerHTML = html; return d; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
var SCREEN = document.getElementById('screen');
function showFatal(msg){ try { SCREEN.innerHTML = '<div style="padding:16px 14px;font-family:monospace;font-size:12px;color:#9a3412;white-space:pre-wrap;word-break:break-word">Diagnostic (screenshot this):\n\n' + String(msg) + '</div>'; } catch (e) {} }
window.addEventListener('error', function (ev) { showFatal('JS error: ' + ((ev.error && (ev.error.stack || ev.error.message)) || ev.message || 'unknown') + '\n@ ' + (ev.filename || '') + ':' + (ev.lineno || '')); });
window.addEventListener('unhandledrejection', function (ev) { var r = ev.reason; showFatal('Promise rejected: ' + ((r && (r.stack || r.message)) || String(r))); });
function render(node){ try { SCREEN.innerHTML = ''; SCREEN.appendChild(node); if (window.scrollTo) window.scrollTo(0, 0); } catch (e) { showFatal('render: ' + (e.stack || e.message)); } }
function hdr(title, sub, flag){
  return '<div class="topbar' + (flag ? ' flag' : '') + '">'
    + '<div class="brand">ENKI &amp; GEDE BAGUS &middot; BALI</div>'
    + '<h1>' + esc(title) + '</h1>'
    + '<div class="sub">' + sub + (P.demo ? ' · <span class="demo">DEMO DATA</span>' : '') + '</div></div>';
}
function backBtn(fn){ var b = el('<button class="back">&#8592; BACK</button>'); b.firstChild.onclick = fn; return b.firstChild; }
function pdfStub(kind){ alert('PDF export (' + kind + ') will be wired to the existing PDF pipeline — Alfred sends the file to chat.'); }
function sendPdf(btn){
  if (!P || P.demo) { alert('PDF is available in live mode only.'); return; }
  var old = btn.textContent;
  btn.disabled = true; btn.textContent = 'Sending…';
  fetch(API_URL, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ initData: (WA && WA.initData) || '', route: ROUTE, action: 'app_pdf', params: {} })
  }).then(function (r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    btn.textContent = '✓ Sent to chat';
    try { if (WA && WA.HapticFeedback) WA.HapticFeedback.notificationOccurred('success'); } catch (e) {}
    setTimeout(function () { btn.disabled = false; btn.textContent = old; }, 4000);
  }).catch(function (e) {
    btn.disabled = false; btn.textContent = old;
    alert('PDF failed: ' + ((e && e.message) || e));
  });
}

/* ============ screens ============ */
function scrMenu(){
  var doneRp = 0, total = 0;
  P.sections.forEach(function (s) { doneRp += s.doneRp; total += s.total; });
  if (P.doneRpTotal !== null && P.doneRpTotal !== undefined) doneRp = P.doneRpTotal;
  var budget = P.budget || 0, paid = P.paid || 0;
  var gap = paid - doneRp;
  var big = Math.max(paid, doneRp, 1);
  var flag = Math.abs(gap) > 0.2 * big && Math.abs(gap) >= 50000000;
  var gapPct = Math.round(Math.abs(gap) / big * 100);
  var paidV = '<div class="v"' + (flag && gap > 0 ? ' style="color:var(--flag)"' : '') + '>' + rp(paid) + '</div>';
  var doneV = '<div class="v"' + (flag && gap < 0 ? ' style="color:var(--flag)"' : '') + '>' + rp(doneRp) + '</div>';
  var lightNote = flag ? '<p class="note" style="color:var(--flag)">&#9888; ' + (gap > 0 ? 'Paid ahead of done by ' + rp(gap) : 'Done ahead of paid by ' + rp(-gap)) + ' (' + gapPct + '%)</p>' : '';
  var v = el(
    hdr(P.name, 'Project Report')
    + '<div class="kpi">'
    + '<div><div class="k">Budget</div><div class="v">' + rp(budget) + '</div></div>'
    + '<div><div class="k">Paid</div>' + paidV + '</div>'
    + '<div><div class="k">Done</div>' + doneV + '</div>'
    + '</div>'
    + lightNote
    + '<button class="btn primary" data-a="summary">Project summary</button>'
    + '<button class="btn" data-a="tasks" style="display:flex;justify-content:space-between"><span>Project tasks</span><span style="font-size:11px;color:var(--faint)">' + (P.tasks ? P.tasks.length + '' : '') + '</span></button>'
    + '<button class="btn" data-a="sitecheck">Site check</button>'
    + '<button class="btn" data-a="edit">Update BOQ</button>'
    + '<button class="btn" data-a="payments">Payments (view)</button>'
    + '<button class="btn" data-a="refresh">&#128260; Refresh</button>'
    + '<hr class="sep">'
    + '<button class="btn" data-a="history">&#128220; Change history</button>'
    + '<button class="btn flag" data-a="rollback">&#9888; Emergency rollback</button>'
  );
  v.querySelectorAll('[data-a]').forEach(function (b) {
    b.onclick = function () {
      var a = b.getAttribute('data-a');
      if (a === 'summary') scrSections('summary');
      else if (a === 'tasks') scrTasks('all');
      else if (a === 'sitecheck') scrSections('sitecheck');
      else if (a === 'edit') scrSections('edit');
      else if (a === 'payments') scrPayments();
      else if (a === 'refresh') scrRefresh();
      else if (a === 'history') scrHistory();
      else if (a === 'rollback') scrRollback();
    };
  });
  render(v);
}

function scrSummarySheet(){
  var m = matchSummaryToSheets();
  var C_BLUE = '#2563eb';
  var rows = P.summaryRows.map(function (r, idx) {
    if (r.k === 's') return '<tr><td colspan="2" style="font-weight:700;color:var(--ink);padding-top:16px">' + esc(r.name) + '</td></tr>';
    if (r.k === 't') {
      var tm = [];
      if (r.paid !== null && r.paid !== undefined) tm.push('paid ' + rp(r.paid));
      if (r.done !== null && r.done !== undefined) tm.push('done ' + rp(r.done));
      return '<tr class="totalrow"><td>' + esc(r.name)
        + (tm.length ? '<div class="meta" style="font-weight:400">' + tm.join(' &middot; ') + '</div>' : '') + '</td>'
        + '<td class="num">' + rp(r.total) + '</td></tr>';
    }
    var meta = [];
    if (r.paid !== null && r.paid !== undefined) meta.push('paid ' + rp(r.paid));
    if (r.done !== null && r.done !== undefined) meta.push('done ' + rp(r.done));
    if (r.note) meta.push(esc(r.note));
    var si = m.map[idx];
    var nameHtml = (si >= 0)
      ? '<span style="color:' + C_BLUE + '">' + esc(r.name) + '</span>'
      : '<span style="color:var(--faint)">' + esc(r.name) + '</span>';
    return (si >= 0 ? '<tr class="rowlink" data-i="' + si + '">' : '<tr>')
      + '<td>' + (r.no ? '<span class="code">' + esc(r.no) + '</span> ' : '') + nameHtml
      + (meta.length ? '<div class="meta">' + meta.join(' &middot; ') + '</div>' : '') + '</td>'
      + '<td class="num money">' + (r.total !== null && r.total !== undefined ? rp(r.total) : '') + '</td></tr>';
  }).join('');
  var v = el(
    hdr(P.name, 'Project summary &middot; Read only')
    + '<table><thead><tr><th>Item</th><th class="num">Total</th></tr></thead>'
    + '<tbody>' + rows + '</tbody></table>'
    + '<div class="foot"><button class="pdfbtn">PDF</button><button class="pdfbtn anbtn">Analytics</button></div>'
  );
  v.insertBefore(backBtn(scrMenu), v.firstChild);
  v.querySelectorAll('.rowlink').forEach(function (r) { r.onclick = function () { scrDetail(P.sections[+r.getAttribute('data-i')]); }; });
  v.querySelector('.pdfbtn:not(.anbtn)').onclick = function () { sendPdf(this); };
  v.querySelector('.anbtn').onclick = function () { scrAnalytics('summary'); };
  render(v);
}

function matchSummaryToSheets(){
  /* для каждой строки сводного листа ищем лист-раздел: все токены имени листа
     должны найтись внутри токенов строки (PRELIM 2 ~ PRELIMINARIES 2, add Structure ~ Additional Structure works) */
  function toks(s){ return String(s || '').toLowerCase().replace(/[^a-z0-9а-я]+/g, ' ').split(' ').filter(function (x) { return x; }); }
  var used = {};
  var map = P.summaryRows.map(function (r) {
    if (r.k !== 'i') return -1;
    var rowTok = toks(r.name);
    for (var i = 0; i < P.sections.length; i++) {
      if (used[i]) continue;
      var st = toks(P.sections[i].name);
      if (!st.length) continue;
      var all = st.every(function (t) { return rowTok.some(function (rt) { return rt.indexOf(t) >= 0; }); });
      if (all) { used[i] = 1; return i; }
    }
    return -1;
  });
  var extra = [];
  for (var i = 0; i < P.sections.length; i++) if (!used[i]) extra.push(i);
  return { map: map, extra: extra };
}

function scrSiteCheckList(){
  var m = matchSummaryToSheets();
  function dotc(color){ return '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + color + ';margin-right:7px;vertical-align:1px"></span>'; }
  var C_GREEN = '#16a34a', C_GREY = 'var(--faint)', C_BLUE = '#2563eb';
  function nm(txt, hasSheet){ return '<span style="color:' + (hasSheet ? C_BLUE : 'var(--faint)') + '">' + esc(txt) + '</span>'; }
  var rows = P.summaryRows.map(function (r, idx) {
    if (r.k === 't') return '';
    if (r.k === 's') return '<tr><td colspan="2" style="font-weight:700;color:var(--ink);padding-top:16px">' + esc(r.name) + '</td></tr>';
    var donePct = (r.done !== null && r.done !== undefined && r.total) ? Math.round(100 * r.done / r.total) : null;
    var si = m.map[idx];
    if (si >= 0) {
      return '<tr class="rowlink" data-i="' + si + '"><td>' + dotc(r.lock === false ? C_GREEN : C_GREY) + nm(r.name, true)
        + '<div class="bar"><i style="width:' + (donePct || 0) + '%"></i></div></td>'
        + '<td class="num" style="color:var(--faint);font-size:11px">done ' + pct(donePct) + '</td></tr>';
    }
    if (r.lock === false) {
      return '<tr><td>' + dotc(C_GREEN) + nm(r.name, false)
        + '<div class="meta">prev ' + pct(donePct) + '</div></td>'
        + '<td class="num"><input class="spct" type="number" min="0" max="100" inputmode="numeric" placeholder="&mdash;" data-no="' + esc(String(r.no)) + '" data-prev="' + (donePct == null ? '' : donePct) + '"></td></tr>';
    }
    return '<tr><td>' + dotc(C_GREY) + nm(r.name, false)
      + '<div class="meta">locked &mdash; % on summary</div></td>'
      + '<td class="num" style="color:var(--faint);font-size:11px">done ' + pct(donePct) + '</td></tr>';
  }).join('');
  var extraRows = m.extra.map(function (si) {
    var s = P.sections[si];
    return '<tr class="rowlink" data-i="' + si + '"><td>' + dotc(C_GREY) + nm(s.name, true)
      + '<div class="bar"><i style="width:' + (s.done || 0) + '%"></i></div></td>'
      + '<td class="num" style="color:var(--faint);font-size:11px">done ' + pct(s.done) + '</td></tr>';
  }).join('');
  if (extraRows) extraRows = '<tr><td colspan="2" style="font-weight:700;color:var(--ink);padding-top:16px">SHEETS NOT ON SUMMARY PAGE</td></tr>' + extraRows;
  var v = el(
    hdr(P.name, 'Site check &middot; ' + dotc(C_GREEN) + 'open &nbsp;' + dotc(C_GREY) + 'locked &middot; <span style="color:' + C_BLUE + '">blue</span> = tap to open')
    + '<table><thead><tr><th>Section</th><th class="num">New %</th></tr></thead>'
    + '<tbody>' + rows + extraRows + '</tbody></table>'
    + '<div class="foot"><button class="actbtn" disabled>Save % &rarr; Works Done</button><button class="pdfbtn anbtn">Analytics</button></div>'
  );
  v.insertBefore(backBtn(scrMenu), v.firstChild);
  v.querySelectorAll('.rowlink').forEach(function (r) {
    r.onclick = function () { scrSiteCheck(P.sections[+r.getAttribute('data-i')]); };
  });
  v.querySelector('.anbtn').onclick = function () { scrAnalytics('sitecheck'); };
  var sinputs = v.querySelectorAll('input.spct');
  var save = v.querySelector('.actbtn');
  function refreshSave(){
    var n = 0;
    sinputs.forEach(function (inp) {
      var prev = inp.getAttribute('data-prev');
      var changed = inp.value !== '' && +inp.value !== (prev === '' ? -1 : +prev);
      inp.classList.toggle('changed', changed);
      if (changed) n++;
    });
    save.disabled = n === 0;
    save.textContent = n ? 'Save ' + n + ' → Works Done' : 'Save % → Works Done';
  }
  sinputs.forEach(function (inp) { inp.oninput = refreshSave; });
  save.onclick = function () {
    var changes = [];
    sinputs.forEach(function (inp) {
      var prev = inp.getAttribute('data-prev');
      if (inp.value !== '' && +inp.value !== (prev === '' ? -1 : +prev)) changes.push({ no: inp.getAttribute('data-no'), pct: +inp.value });
    });
    if (!changes.length) return;
    if (P.demo) { alert('DEMO: nothing is written.'); return; }

    scrHistoryList((j && j.history) || []);
  }).catch(function (e) {
    var v = el(hdr(P.name, 'History failed') + '<p class="note">' + esc(String((e && e.message) || e)) + '</p>');
    v.insertBefore(backBtn(scrMenu), v.firstChild); render(v);
  });
}
function scrHistoryList(items){
  var fl = { works_done: 'done', qty: 'qty', price: 'price', name: 'name' };
  var rows = items.map(function (h) {
    var f = fl[h.field] || h.field || '';
    return '<tr><td>' + esc(fmtTs(h.date)) + '<div class="meta">' + esc(h.source || '') + '</div></td>'
      + '<td>' + esc(h.code || '') + (f ? ' <span class="code">' + esc(f) + '</span>' : '') + '<div class="meta">' + esc(h.list || '') + '</div></td>'
      + '<td class="num" style="color:var(--faint)">' + (fmtVal(h.prev) !== '' ? esc(fmtVal(h.prev)) : '&mdash;') + '</td>'
      + '<td class="num money">' + (fmtVal(h.next) !== '' ? esc(fmtVal(h.next)) : '&mdash;') + '</td></tr>';
  }).join('') || '<tr><td colspan="4"><p class="note">No changes recorded yet.</p></td></tr>';
  var v = el(
    hdr(P.name, 'Change history &middot; Read only')
    + '<table><thead><tr><th>When</th><th>Item</th><th class="num">Was</th><th class="num">Now</th></tr></thead>'
    + '<tbody>' + rows + '</tbody></table>'
    + '<p class="note">Full audit log (ARCHIVE) &mdash; newest first. This is where to spot a wrong entry, then roll back.</p>'
  );
  v.insertBefore(backBtn(scrMenu), v.firstChild);
  render(v);
}
function scrRollback(){
  if (P.demo) { scrRollbackList((P.snapshots || []).map(function (s) { return { ts: s.date, label: s.label }; })); return; }
  SCREEN.innerHTML = '<div class="topbar flag"><div class="brand">ENKI &amp; GEDE BAGUS &middot; BALI</div><h1>Emergency rollback</h1><div class="sub">Loading versions&hellip;</div></div>';
  api('app_snapshots_read', {}).then(function (j) {
    scrRollbackList((j && j.snapshots) || []);
  }).catch(function (e) {
    var v = el(hdr(P.name, 'Rollback failed', true) + '<p class="note">' + esc(String((e && e.message) || e)) + '</p>');
    v.insertBefore(backBtn(scrMenu), v.firstChild); render(v);
  });
}
function scrRollbackList(snaps){
  var cards = snaps.map(function (s, i) {
    return '<div class="card" data-i="' + i + '"><div class="t">' + esc(fmtTs(s.ts || s.date)) + '</div>'
      + '<div class="m">' + esc(s.label || '') + '</div></div>';
  }).join('') || '<p class="note">No saved versions yet.</p>';
  var v = el(
    hdr(P.name, 'Emergency rollback', true)
    + '<div class="caps" style="margin-bottom:10px">Select a version to restore</div>'
    + cards
    + '<div class="foot"><span></span><button class="actbtn flag" disabled>&#9888; Restore selected version</button></div>'
    + '<p class="note">Restore writes through ARCHIVE and audit log. Locked sections are not touched.</p>'
  );
  v.insertBefore(backBtn(scrMenu), v.firstChild);
  var btn = v.querySelector('.actbtn'), sel = -1;
  v.querySelectorAll('.card').forEach(function (c) {
    c.onclick = function () {
      v.querySelectorAll('.card').forEach(function (x) { x.classList.remove('sel'); });
      c.classList.add('sel'); sel = +c.getAttribute('data-i'); btn.disabled = false;
    };
  });
  btn.onclick = function () {
    if (sel < 0) return;
    if (P.demo) { alert('DEMO: nothing is restored.'); return; }
    var snap = snaps[sel];
    askConfirm('Restore version from ' + fmtTs(snap.ts) + '?\nUnlocked sections are set back to this version; locked sections stay as-is.', function (yes) {
      if (!yes) return;
      btn.disabled = true; btn.textContent = 'Restoring…';
      api('app_restore', { snap_ts: snap.ts, dry_run: false }).then(function (j) {
        if (!j || !j.ok) throw new Error((j && j.error) || 'error');
        var msg = [];
        if (j.count > 0) msg.push('✓ Restored ' + j.count + ' position(s).');
        if (j.locked && j.locked.length) msg.push('🔒 ' + j.locked.length + ' locked, not touched.');
        if (j.unchanged && j.unchanged.length) msg.push(j.unchanged.length + ' already matched.');
        alert(msg.join('\n') || 'Nothing to restore.');
        boot();
      }).catch(function (e) {
        alert('Restore failed: ' + ((e && e.message) || e));
        btn.disabled = false; btn.textContent = '⚠ Restore selected version';
      });
    });
  };
  render(v);
}

function refreshResult(sec, pos, note){
  var v = el(
    hdr(P.name, 'Structure refresh')
    + '<div class="bigok">Structure refreshed</div>'
    + '<div class="kpi" style="max-width:340px">'
    + '<div><div class="k">Sections</div><div class="v">' + sec + '</div></div>'
    + '<div><div class="k">Positions</div><div class="v">' + pos + '</div></div>'
    + '</div>'
    + '<p class="note">' + note + '</p>'
  );
  v.insertBefore(backBtn(scrMenu), v.firstChild);
  render(v);
}
function scrRefresh(){
  if (P.demo) {
    var pos = P.sections.reduce(function (a, s) { return a + s.positions.length; }, 0);
    refreshResult(P.sections.length, pos, 'DEMO. Live: rebuilds the map from the current sheet, runs nightly too.');
    return;
  }
  SCREEN.innerHTML = '<div class="topbar"><div class="brand">ENKI &amp; GEDE BAGUS &middot; BALI</div><h1>Refreshing&hellip;</h1><div class="sub">Rebuilding structure from the sheet</div></div>';
  api('app_map_refresh').then(function (j) {
    if (j && !j.ok && j.error === 'manual_map') {
      var vm = el(hdr(P.name, 'Manual map') + '<p class="note">This project uses a hand-built map and is not auto-rebuilt. Ask Alfred if it needs updating.</p>');
      vm.insertBefore(backBtn(scrMenu), vm.firstChild);
      render(vm);
      return;
    }
    if (!j || !j.ok) throw new Error((j && (j.error || 'error')) || 'error');
    var sec = j.sections, pos = j.positions;
    var skips = (j.skipped && j.skipped.length) ? ' &middot; skipped: ' + j.skipped.map(esc).join(', ') : '';
    return api('app_smeta_read').then(function (s) {
      if (s && s.ok) applySmeta(s);
      refreshResult(sec, pos, 'Structure rebuilt from the current sheet. Marked (#) and hidden sheets are excluded.' + skips);
    });
  }).catch(function (e) {
    SCREEN.innerHTML = '';
    var v = el(hdr(P.name, 'Refresh failed', true) + '<p class="note">' + esc(String((e && e.message) || e)) + '</p>');
    v.insertBefore(backBtn(scrMenu), v.firstChild);
    SCREEN.appendChild(v);
  });
}

/* ============ trello tasks ============ */
var OPEN_STATUSES = ['New', 'In progress', 'On hold', 'Review'];
var STATUS_COLOR = { 'New': 'var(--faint)', 'In progress': 'var(--navy)', 'On hold': '#b45309', 'Review': '#0f6e56', 'Approved': '#0f6e56', 'Cancelled': 'var(--faint)' };
function openTasks(){ return (P.tasks || []).filter(function (t) { return OPEN_STATUSES.indexOf(t.status) >= 0; }); }
function fmtDate(iso){ if (!iso) return null; var d = new Date(iso); if (isNaN(d)) return null; return ('0' + d.getDate()).slice(-2) + '.' + ('0' + (d.getMonth() + 1)).slice(-2); }
function api(action, params){
  return fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ initData: (WA && WA.initData) || '', route: ROUTE, action: action, params: params || {} })
  }).then(function (r) { return r.json(); });
}
function scrTasks(filter){
  if (!P.tasks) {
    if (P.demo) { P.tasks = []; }
    else {
      SCREEN.innerHTML = '<div class="topbar"><div class="brand">ENKI &amp; GEDE BAGUS &middot; BALI</div><h1>Loading&hellip;</h1><div class="sub">Fetching tasks from Trello</div></div>';
      api('app_tasks_read').then(function (j) {
        if (!j || !j.ok) throw new Error((j && j.error) || 'error');
        P.tasks = j.tasks || [];
        scrTasks(filter);
      }).catch(function (e) {
        SCREEN.innerHTML = '';
        var v = el(hdr('Connection error', 'Could not load tasks', true)
          + '<p class="note">' + esc(String((e && e.message) || e)) + '</p>');
        v.insertBefore(backBtn(scrMenu), v.firstChild);
        SCREEN.appendChild(v);
      });
      return;
    }
  }
  var all = P.tasks || [];
  var shown = filter === 'all' ? all : all.filter(function (t) { return t.status === filter; });
  var ORDER = ['New', 'In progress', 'On hold', 'Review', 'Approved', 'Cancelled'];
  var chips = '<span class="chip' + (filter === 'all' ? ' on' : '') + '" data-f="all">All ' + all.length + '</span>';
  ORDER.forEach(function (s) {
    var n = all.filter(function (t) { return t.status === s; }).length;
    if (!n) return;
    chips += '<span class="chip' + (filter === s ? ' on' : '') + '" data-f="' + esc(s) + '">' + esc(s) + ' ' + n + '</span>';
  });
  var rows = shown.map(function (t) {
    var dates = (fmtDate(t.start) || fmtDate(t.due)) ? ((fmtDate(t.start) || '—') + ' → ' + (fmtDate(t.due) || '—')) : 'no dates';
    var metaColor = t.overdue ? 'color:var(--flag)' : 'color:var(--muted)';
    return '<div style="padding:10px 0;border-bottom:1px solid var(--hair2)">'
      + '<div style="display:flex;justify-content:space-between;gap:8px">'
      + '<span style="font-size:13px">' + esc(t.name) + '</span>'
      + '<span class="caps" style="white-space:nowrap;padding-top:2px;color:' + (STATUS_COLOR[t.status] || 'var(--muted)') + '">' + esc(t.status) + '</span></div>'
      + '<div style="font-size:11px;margin-top:3px;' + metaColor + '">'
      + (t.assignee ? esc(t.assignee) : '<span style="color:var(--faint)">unassigned</span>')
      + ' &middot; ' + dates + (t.overdue ? ' &middot; overdue' : '') + '</div></div>';
  }).join('');
  if (!shown.length) rows = '<p class="note">No tasks here.</p>';
  var v = el(
    hdr('Project tasks', esc(P.name) + ' &middot; read only')
    + '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">' + chips + '</div>'
    + rows
    + '<div class="foot"><button class="pdfbtn">PDF</button><button class="pdfbtn anbtn">Analytics</button></div>'
  );
  v.insertBefore(backBtn(scrMenu), v.firstChild);
  v.querySelectorAll('.chip').forEach(function (c) {
    c.onclick = function () { scrTasks(c.getAttribute('data-f')); };
  });
  v.querySelector('.pdfbtn:not(.anbtn)').onclick = function () { pdfStub('tasks'); };
  v.querySelector('.anbtn').onclick = function () { scrAnalytics('tasks'); };
  render(v);
}

/* ============ analytics (Kevin, contextual) ============ */
function scrAnalytics(context){
  var titles = { summary: 'Budget analytics', sitecheck: 'Progress analytics', tasks: 'Task analytics' };
  var title = titles[context] || 'Analytics';
  if (P.demo) {
    var v0 = el(hdr(P.name, title + ' &middot; by Kevin')
      + '<p class="note">DEMO. Live: Kevin reads the ' + esc(context) + ' and writes a short analysis here.</p>');
    v0.insertBefore(backBtn(scrMenu), v0.firstChild);
    render(v0);
    return;
  }
  SCREEN.innerHTML = '<div class="topbar"><div class="brand">ENKI &amp; GEDE BAGUS &middot; BALI</div><h1>Kevin is thinking&hellip;</h1><div class="sub">Analyzing ' + esc(context) + '</div></div>';
  api('app_analyze', { context: context, project: P.name }).then(function (j) {
    if (!j || !j.ok) throw new Error((j && (j.error || 'error')) || 'error');
    var kpiHtml = (j.kpis && j.kpis.length) ? '<div class="kpi">' + j.kpis.map(function (x) { return '<div><div class="k">' + esc(x.k) + '</div><div class="v">' + esc(x.v) + '</div></div>'; }).join('') + '</div>' : '';
    var body = '<div style="font-family:var(--serif);font-size:14px;line-height:1.65;color:var(--ink);white-space:pre-wrap;margin-top:14px">' + esc(j.text) + '</div>';
    var v = el(hdr(P.name, title + ' &middot; by Kevin') + kpiHtml + body
      + '<div class="foot"><span></span><button class="pdfbtn anbtn">&#8635; Re-run</button></div>');
    v.insertBefore(backBtn(scrMenu), v.firstChild);
    v.querySelector('.anbtn').onclick = function () { scrAnalytics(context); };
    render(v);
  }).catch(function (e) {
    SCREEN.innerHTML = '';
    var v = el(hdr(P.name, 'Analytics failed', true) + '<p class="note">' + esc(String((e && e.message) || e)) + '</p>');
    v.insertBefore(backBtn(scrMenu), v.firstChild);
    SCREEN.appendChild(v);
  });
}

/* ============ boot: live data via webhook, demo fallback ============ */
var API_URL = 'https://alfred-mishkin.app.n8n.cloud/webhook/app-api';
function applySmeta(j){
  P.budget = j.budget; P.paid = j.paid;
  P.summaryRows = j.summary_rows || null;
  P.doneRpTotal = (j.done_rp === undefined) ? null : j.done_rp;
  P.sections = (j.sections || []).map(function (s) {
    return { id: s.name, name: s.name, total: s.total || 0, doneRp: s.done_rp || 0, done: s.done_pct,
      positions: (s.positions || []).map(function (p) {
        return { code: p.code, desc: p.desc, qty: p.qty, unit: p.unit || '', price: p.price, total: p.total || 0, done: p.done_pct };
      }) };
  });
}
var PROJECTS = [
  { route: 'reimagined_sayan', name: 'Reimagined Sayan' },
  { route: 'karina_jimbaran', name: 'Karina Jimbaran' },
  { route: 'dreamland_pecatu', name: 'Dreamland Pecatu' },
  { route: 'yin_yan_batu_bolong', name: 'Yin Yan Batu Bolong' }
];
function scrPickProject(){
  var v = el(
    '<div class="topbar"><div class="brand">ENKI &amp; GEDE BAGUS &middot; BALI</div><h1>Choose project</h1><div class="sub">Select a construction project</div></div>'
    + PROJECTS.map(function (p) { return '<button class="btn" data-r="' + p.route + '">' + esc(p.name) + '</button>'; }).join('')
  );
  v.querySelectorAll('[data-r]').forEach(function (b) {
    b.onclick = function () { ROUTE = b.getAttribute('data-r'); boot(); };
  });
  render(v);
}
function boot(){
  var hasTg = WA && WA.initData && WA.initData.length > 0;
  if (!ROUTE && hasTg) { scrPickProject(); return; }
  var wantLive = ROUTE && ROUTE !== 'demo' && hasTg;
  if (!wantLive) { scrMenu(); return; }
  SCREEN.innerHTML = '<div class="topbar"><div class="brand">ENKI &amp; GEDE BAGUS &middot; BALI</div><h1>Loading&hellip;</h1><div class="sub">Fetching data from Alfred</div></div>';
  var status = 0;
  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ initData: (WA && WA.initData) || '', route: ROUTE, params: {} })
  })
  .then(function (r) { status = r.status; return r.text(); })
  .then(function (txt) {
    var j = null;
    try { j = JSON.parse(txt); } catch (pe) { throw new Error('HTTP ' + status + ' — not JSON: ' + String(txt).slice(0, 200)); }
    if (!j || !j.ok) throw new Error('HTTP ' + status + ' — ' + (j && (j.error || 'error')) + (j && j.reason ? ' / ' + j.reason : '') + (j && j.detail ? ' / ' + j.detail : ''));
    P = { name: j.project || ROUTE, route: j.route, demo: false, payments: [], snapshots: [], tasks: null };
    applySmeta(j);
    scrMenu();
  })
  .catch(function (e) {
    showFatal('Load failed:\n' + ((e && (e.message || e.stack)) || String(e)) + '\n\nroute=' + ROUTE + '\ninitData len=' + ((WA && WA.initData && WA.initData.length) || 0));
  });
}
boot();
</script>
